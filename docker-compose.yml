version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: sqlite:////app/data/dev.db
    ports:
      - "8002:8001"
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - frontend/.env
    ports:
      - "8000:8010"
    depends_on:
      - backend
    environment:
      DJANGO_DB_PATH: /app/data/db.sqlite3
      ALLOWED_HOSTS: "*"
    volumes:
      - frontend_data:/app/data
    command: >
      /bin/sh -c "python manage.py migrate --no-input && python manage.py runserver 0.0.0.0:8010"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:latest
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped

volumes:
  backend_data:
  frontend_data:
